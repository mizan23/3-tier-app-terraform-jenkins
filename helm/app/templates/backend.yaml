apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:

      initContainers:
        - name: wait-for-postgres
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."
                sleep 2
              done

      containers:
        - name: backend
          image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.backend.servicePort }}

          env:
            - name: DATABASE_URL
              value: postgres://postgres:postgres@postgres:5432/appdb

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - port: 3000   # 🔥 service port (nginx uses this)
      targetPort: {{ .Values.backend.servicePort }}
      protocol: TCP
  type: ClusterIP