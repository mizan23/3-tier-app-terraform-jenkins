frontend:
  image: mizan23/frontend
  tag: latest
  replicas: 2
  servicePort: 80

backend:
  image: mizan23/backend
  tag: latest   # overridden by CI/CD
  replicas: 2
  servicePort: 3000

postgres:
  image: postgres:15
  user: postgres
  password: postgres
  db: appdb
  port: 5432   # 🔥 REQUIRED

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpuUtilization: 60


